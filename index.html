<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - Tetris Game</title>
    <meta name="description" content="经典俄罗斯方块游戏，支持暂停、等级升级、计分系统">
    <meta name="keywords" content="俄罗斯方块，tetris，方块游戏，经典游戏">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-container">
            <div class="header">
                <h1 class="game-title">俄罗斯方块</h1>
                <p class="game-subtitle">经典游戏 · 极致体验</p>
            </div>
            
            <div class="game-wrapper">
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="300" height="600"></canvas>
                </div>
                
                <div class="side-panel">
                    <div class="info-box">
                        <h3 class="info-label">下一个</h3>
                        <div class="canvas-container">
                            <canvas id="nextCanvas" width="100" height="100"></canvas>
                        </div>
                    </div>
                    
                    <div class="info-box">
                        <h3 class="info-label">分数</h3>
                        <p id="score" class="info-value">0</p>
                    </div>
                    
                    <div class="info-box">
                        <h3 class="info-label">等级</h3>
                        <p id="level" class="info-value">1</p>
                    </div>
                    
                    <div class="info-box">
                        <h3 class="info-label">消除行数</h3>
                        <p id="lines" class="info-value">0</p>
                    </div>
                    
                    <div class="controls">
                        <button id="startBtn" class="btn-primary">
                            <span class="btn-text">开始游戏</span>
                        </button>
                        <button id="pauseBtn" class="btn-secondary">
                            <span class="btn-text">暂停</span>
                        </button>
                    </div>
                    
                    <div class="instructions">
                        <h3 class="instructions-title">操作说明</h3>
                        <div class="instruction-row">
                            <span class="key">← →</span>
                            <span class="desc">左右移动</span>
                        </div>
                        <div class="instruction-row">
                            <span class="key">↑</span>
                            <span class="desc">旋转</span>
                        </div>
                        <div class="instruction-row">
                            <span class="key">↓</span>
                            <span class="desc">加速下落</span>
                        </div>
                        <div class="instruction-row">
                            <span class="key">Space</span>
                            <span class="desc">直接下落</span>
                        </div>
                        <div class="instruction-row">
                            <span class="key">P</span>
                            <span class="desc">暂停/继续</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 移动端控制按钮 -->
    <div class="mobile-controls" id="mobileControls">
        <div class="controls-wrapper">
            <!-- D-Pad 方向按钮 -->
            <div class="d-pad">
                <button class="control-btn btn-up" data-action="up">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 5L19 12M12 5L5 12M12 5V19"/>
                    </svg>
                </button>
                <div class="d-pad-row">
                    <button class="control-btn btn-left" data-action="left">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M5 12L12 5M5 12L12 19M5 12H19"/>
                        </svg>
                    </button>
                    <button class="control-btn btn-down" data-action="down">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M12 19L5 12M12 19L19 12M12 19V5"/>
                        </svg>
                    </button>
                    <button class="control-btn btn-right" data-action="right">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M19 12L12 5M19 12L12 19M19 12H5"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- 功能按钮 -->
            <div class="action-buttons">
                <button class="control-btn btn-rotate" data-action="rotate" aria-label="旋转">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 12a9 9 0 0 1 9-9M9 3l3 3-3 3"/>
                        <path d="M12 21a9 9 0 0 0 9-9"/>
                    </svg>
                </button>
                <button class="control-btn btn-drop" data-action="drop" aria-label="直接下落">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 3v18"/>
                        <path d="m16 17-4 4-4-4"/>
                    </svg>
                </button>
                <button class="control-btn btn-pause" data-action="pause" aria-label="暂停/继续">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="6" y="4" width="4" height="16" rx="1"/>
                        <rect x="14" y="4" width="4" height="16" rx="1"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- 移动端分数显示 -->
    <div class="mobile-score" id="mobileScore">
        <div class="score-item">
            <span class="score-label">分数</span>
            <span id="mobileScoreValue" class="score-value">0</span>
        </div>
        <div class="score-item">
            <span class="score-label">等级</span>
            <span id="mobileLevelValue" class="score-value">1</span>
        </div>
    </div>
    
    <!-- 连击提示 -->
    <div class="combo-display" id="comboDisplay"></div>
    
    <!-- 消除动画画布 -->
    <canvas id="effectsCanvas" class="effects-canvas"></canvas>
    
    <!-- 开始提示 -->
    <div class="start-hint" id="startHint">
        <div class="hint-content">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
            </svg>
            <p>点击"开始游戏"</p>
        </div>
    </div>
    
    <script src="tetris.js"></script>
</body>
</html>
