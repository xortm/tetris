<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device与其他=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>俄罗斯方块 - Tetris Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 280px;
            padding-top: env(safe-area-inset-top);
        }

        h1 {
            color: #38bdf8;
;
            margin-bottom: 10px;
            font-size: 1.5rem;
            text-align: center;
        }

        .game-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
            padding: 10px;
        }

        canvas {
            border: 3px solid #334155;
            border-radius: 12px;
            background: #1a1a2e;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: block;
        }

        /* 移动端缩小游戏高度 */
        #gameCanvas {
            width: 280px;
            height: 560px;
            max-width: 100%;
            max-height: 50vh;
        }

        #nextCanvas {
            width: 90px;
            height: 90px;
        }

        .side-panel {
            background: rgba(30, 41, 59, 0.8);
            padding: 15px;
            border-radius: 12px;
            min-width: 140px;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .info-box {
            margin-bottom: 12px;
        }

        .info-label {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #38bdf8;
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            z-index: 10;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.97);
        }

        #startBtn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        #pauseBtn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .message {
            color: #22c55e;
            text-align: center;
            margin: 10px 0;
            font-size: 16px;
            min-height: 24px;
        }

        .debug {
            background: rgba(30, 41, 59, 0.8);
            padding: 10px;
            border-radius: 8px;
            max-width: 100%;
            margin: 10px auto;
            font-family: monospace;
            font-size: 10px;
            max-height: 120px;
            overflow-y: auto;
        }

        .debug .entry {
            padding: 2px 0;
            border-bottom: 1px solid #334155;
        }

        .debug .success { color: #22c55e; }
        .debug .error { color: #ef4444; }
        .debug .info { color: #38bdf8; }

        .instructions {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #334155;
            font-size: 12px;
        }

        .instructions h3 {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .instruction-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .key {
            background: #334155;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 11px;
        }

        .desc {
            color: #94a3b8;
        }

        /* 移动端控制 - 增大按钮 */
        .mobile-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 10px calc(15px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            z-index: 1000;
            border-top: 1px solid #334155;
        }

        .controls-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 500px;
            justify-content: space-between;
        }

        .d-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .d-pad-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        /* 增大控制按钮尺寸 */
        .control-btn {
            width: 65px;
            height: 65px;
            border-radius: 15px;
            background: #334155;
            border: 2px solid #475569;
            color: #38bdf8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .control-btn:active,
        .control-btn.active {
            background: #38bdf8;
            color: #0f172a;
            transform: scale(0.92);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            flex: 1;
        }

        .action-buttons .control-btn {
            width: 55px;
            height: 55px;
        }

        /* 增大SVG图标 */
        .control-btn svg {
            width: 32px;
            height: 32px;
        }

        .mobile-score {
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            right: 10px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            z-index: 999;
            border: 1px solid #334155;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 11px;
            color: #94a3b8;
        }

        .score-value {
            font-family: monospace;
            font-size: 16px;
            font-weight: 600;
            color: #38bdf8;
        }

        /* 桌面端隐藏移动端控制 */
        @media (min-width: 769px) {
            .mobile-controls,
            .mobile-score {
                display: none;
            }

            body {
                padding-bottom: 0;
            }

            #gameCanvas {
                width: 300px;
                height: 600px;
                max-height: none;
            }

            .side-panel {
                min-width: 200px;
            }

            .info-value {
                font-size: 24px;
            }

            h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                align-items: center;
                padding: 5px;
            }

            .side-panel {
                width: 100%;
                max-width: 300px;
            }

            .controls {
                width: 100%;
                max-width: 300px;
            }

            button {
                width: 100%;
            }

            .instructions {
                display: none;
            }

            .debug {
                display: none;
            }

            .message {
                display: none;
            }

            .side-panel .info-box:nth-child(n+2) {
                display: none;
            }
        }

        @media (max-width: 480px) {
            #gameCanvas {
                width: 260px;
                height: 520px;
            }

            .control-btn {
                width: 60px;
                height: 60px;
            }

            .action-buttons .control-btn {
                width: 50px;
                height: 50px;
            }

            .control-btn svg {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 380px) {
            #gameCanvas {
                width: 240px;
                height: 480px;
            }

            .control-btn {
                width: 55px;
                height: 55px;
            }

            .action-buttons .control-btn {
                width: 45px;
                height: 45px;
            }

            .control-btn svg {
                width: 26px;
                height: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="600"></canvas>

        <div class="side-panel">
            <div class="info-box">
                <div class="info-label">下一个</div>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>

            <div class="info-box">
                <div class="info-label">分数</div>
                <div class="info-value" id="score">0</div>
            </div>

            <div class="info-box">
                <div class="info-label">等级</div>
                <div class="info-value" id="level">1</div>
            </div>

            <div class="info-box">
                <div class="info-label">消除行数</div>
                <div class="info-value" id="lines">0</div>
            </div>

            <div class="controls">
                <button id="startBtn" onclick="handleStartClick()">开始游戏</button>
                <button id="pauseBtn" onclick="handlePauseClick()">暂停</button>
            </div>

            <div class="instructions">
                <h3>操作说明</h3>
                <div class="instruction-row">
                    <span class="key">← →</span>
                    <span class="desc">左右移动</span>
                </div>
                <div class="instruction-row">
                    <span class="key">↑</span>
                    <span class="desc">旋转</span>
                </div>
                <div class="instruction-row">
                    <span class="key">↓</span>
                    <span class="desc">加速下落</span>
                </div>
                <div class="instruction-row">
                    <span class="key">空格</span>
                    <span class="desc">直接下落</span>
                </div>
                <div class="instruction-row">
                    <span class="key">P</span>
                    <span class="desc">暂停/继续</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 移动端控制按钮 -->
    <div class="mobile-controls" id="mobileControls">
        <div class="controls-wrapper">
            <div class="d-pad">
                <button class="control-btn btn-up" data-action="up">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M12 5L19 12M12 5L5 12M12 5V19"/>
                    </svg>
                </button>
                <div class="d-pad-row">
                    <button class="control-btn btn-left" data-action="left">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M5 12L12 5M5 12L12 19M5 12H19"/>
                        </svg>
                    </button>
                    <button class="control-btn btn-down" data-action="down">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M12 19L5 12M12 19L19 12M12 19V5"/>
                        </svg>
                    </button>
                    <button class="control-btn btn-right" data-action="right">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M19 12L12 5M19 12L12 19M19 12H5"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="action-buttons">
                <button class="control-btn btn-rotate" data-action="rotate" aria-label="旋转">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M3 12a9 9 0 0 1 9-9M9 3l3 3-3 3"/>
                        <path d="M12 21a9 9 0 0 0 9-9"/>
                    </svg>
                </button>
                <button class="control-btn btn-drop" data-action="drop" aria-label="直接下落">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M12 3v18"/>
                        <path d="m16 17-4 4-4-4"/>
                    </svg>
                </button>
                <button class="control-btn btn-pause" data-action="pause" aria-label="暂停/继续">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <rect x="6" y="4" width="4" height="16" rx="1"/>
                        <rect x="14" y="4" width="4" height="16" rx="1"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 移动端分数显示 -->
    <div class="mobile-score" id="mobileScore">
        <div class="score-item">
            <span class="score-label">分数</span>
            <span id="mobileScoreValue" class="score-value">0</span>
        </div>
        <div class="score-item">
            <span class="score-label">等级</span>
            <span id="mobileLevelValue" class="score-value">1</span>
        </div>
    </div>

    <div class="message" id="message">点击"开始游戏"按钮</div>

    <div class="debug" id="debug">
        <div class="entry info">[系统] 页面加载完成</div>
    </div>

    <script>
        // ==================== 游戏核心代码 ====================

        var canvas, ctx, next, nextCtx;
        var BLOCK_SIZE = 30;
        var COLS = 10;
        var ROWS = 20;

        var TETROMINOES = {
            'I': { shape: [[1, 1, 1, 1]], color: '#00f0f0' },
            'J': { shape: [[1, 0, 0], [1, 1, 1]], color: '#0000f0' },
            'L': { shape: [[0, 0, 1], [1, 1, 1]], color: '#f0a000' },
            'O': { shape: [[1, 1], [1, 1]], color: '#f0f000' },
            'S': { shape: [[0, 1, 1], [1, 1, 0]], color: '#00f000' },
            'T': { shape: [[0, 1, 0], [1, 1, 1]], color: '#a000f0' },
            'Z': { shape: [[1, 1, 0], [0, 1, 1]], color: '#f00000' }
        };

        var TETROMINO_NAMES = ['I', 'J', 'L', 'O', 'S', 'T', 'Z'];

        var board = [];
        var currentPiece = null;
        var nextPiece = null;
        var score = 0;
        var level = 1;
        var lines = 0;
        var gameOver = false;
        var isPaused = false;
        var dropInterval = 1000;
        var lastDropTime = 0;
        var gameLoopId = null;

        // ==================== 初始化 ====================

        function init() {
            log('init() 被调用', 'info');

            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            next = document.getElementById('nextCanvas');
            nextCtx = next.getContext('2d');

            if (!canvas || !ctx) {
                log('gameCanvas 未找到', 'error');
                return;
            }

            // 调整 BLOCK_SIZE 以适应移动端
            if (window.innerWidth <= 480) {
                BLOCK_SIZE = 26;
            } else if (window.innerWidth <= 380) {
                BLOCK_SIZE = 24;
            }

            createBoard();
            resetGame();
            drawBoard();

            document.addEventListener('keydown', handleKeyPress);

            // 移动端控制
            initMobileControls();

            log('初始化完成', 'success');
        }

        function createBoard() {
            board = [];
            for (var i = 0; i < ROWS; i++) {
                var row = [];
                for (var j = 0; j < COLS; j++) {
                    row.push(null);
                }
                board.push(row);
            }
        }

        function resetGame() {
            log('resetGame() 被调用', 'info');
            createBoard();
();
            score = 0;
            level = 1;
            lines = 0;
            gameOver = false;
            isPaused = false;
            dropInterval = 1000;
            updateStats();
            clearNextBoard();
            currentPiece = null;
            nextPiece = null;

            if (gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
        }

        function startGame() {
            log('startGame() 被调用', 'success');
            resetGame();
            spawnPiece();
            showMessage('游戏进行中...');
            log('游戏开始', 'success');
            gameLoop();
        }

        function togglePause() {
            log('togglePause() 被调用', 'info');
            if (!gameOver && currentPiece) {
                isPaused = !isPaused;
                var pauseBtn = document.getElementById('pauseBtn');
                if (pauseBtn) {
                    pauseBtn.textContent = isPaused ? '继续' : '暂停';
                }
                showMessage(isPaused ? '游戏已暂停' : '游戏继续');
                log('游戏' + (isPaused ? '暂停' : '继续'), 'info');
            }
        }

        // ==================== 方块操作 ====================

        function createPiece() {
            var nameIndex = Math.floor(Math.random() * TETROMINO_NAMES.length);
            var name = TETROMINO_NAMES[nameIndex];
            var tetromino = TETROMINOES[name];

            var shape = [];
            for (var i = 0; i < tetromino.shape.length; i++) {
                shape.push(tetromino.shape[i].slice());
            }

            return {
                shape: shape,
                color: tetromino.color,
                name: name
            };
        }

        function spawnPiece() {
            if (!nextPiece) {
                nextPiece = createPiece();
            }

            currentPiece = nextPiece;
            currentPiece.x = Math.floor((COLS - currentPiece.shape[0].length) / 2);
            currentPiece.y = 0;

            nextPiece = createPiece();
            drawNextPiece();

            if (checkCollision(currentPiece.x, currentPiece.y, currentPiece.shape)) {
                gameOver = true;
                showMessage('游戏结束！点击"开始游戏"重新开始');
                log('游戏结束', 'error');
            }
        }

        function checkCollision(x, y, shape) {
            for (var row = 0; row < shape.length; row++) {
                for (var col = 0; col < shape[row].length; col++) {
                    if (shape[row][col]) {
                        var newX = x + col;
                        var newY = y + row;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }

                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function moveLeft() {
            if (!checkCollision(currentPiece.x - 1, currentPiece.y, currentPiece.shape)) {
                currentPiece.x--;
            }
        }

        function moveRight() {
            if (!checkCollision(currentPiece.x + 1, currentPiece.y, currentPiece.shape)) {
                currentPiece.x++;
            }
        }

        function moveDown() {
            if (!checkCollision(currentPiece.x, currentPiece.y + 1, currentPiece.shape)) {
                currentPiece.y++;
            } else {
                lockPiece();
                clearLines();
                spawnPiece();
            }
        }

        function rotate() {
            var rows = currentPiece.shape.length;
            var cols = currentPiece.shape[0].length;
            var rotated = [];

            for (var i = 0; i < cols; i++) {
                rotated[i] = [];
                for (var j = 0; j < rows; j++) {
                    rotated[i][j] = currentPiece.shape[rows - 1 - j][i];
                }
            }

            if (!checkCollision(currentPiece.x, currentPiece.y, rotated)) {
                currentPiece.shape = rotated;
            } else if (!checkCollision(currentPiece.x.x + 1, currentPiece.y, rotated)) {
                currentPiece.x++;
                currentPiece.shape = rotated;
            } else if (!checkCollision(currentPiece.x - 1, currentPiece.y, rotated)) {
                currentPiece.x--;
                currentPiece.shape = rotated;
            }
        }

        function hardDrop() {
            while (!checkCollision(currentPiece.x, currentPiece.y + 1, currentPiece.shape)) {
                currentPiece.y++;
            }
            moveDown();
        }

        function lockPiece() {
            for (var row = 0; row < currentPiece.shape.length; row++) {
                for (var col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        var y = currentPiece.y + row;
                        var x = currentPiece.x + col;
                        if (y >= 0) {
                            board[y][x] = currentPiece.color;
                        }
                    }
                }
            }
        }

        function clearLines() {
            var linesCleared = 0;

            for (var row = ROWS - 1; row >= 0; row--) {
                var fullLine = true;
                for (var col = 0; col < COLS; col++) {
                    if (!board[row][col]) {
                        fullLine = false;
                        break;
                    }
                }
                if (fullLine) {
                    board.splice(row, 1);
                    var newRow = [];
                    for (var j = 0; j < COLS; j++) {
                        newRow.push(null);
                    }
                    board.unshift(newRow);
                    linesCleared++;
                    row++;
                }
            }

            if (linesCleared > 0) {
                updateScore(linesCleared);
            }
        }

        function updateScore(lines) {
            var points = [0, 100, 300, 500, 800];
            score += points[lines] * level;
            lines += lines;

            if (lines >= level * 10) {
                level++;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
            }

            updateStats();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;

            var mobileScoreEl = document.getElementById('mobileScoreValue');
            var mobileLevelEl = document.getElementById('mobileLevelValue');

            if (mobileScoreEl) mobileScoreEl.textContent = score;
            if (mobileLevelEl) mobileLevelEl.textContent = level;
        }

        // ==================== 绘制 ====================

        function drawBoard() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (var row = 0; row < ROWS; row++) {
                for (var col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        drawBlock(ctx, col, row, board[row][col]);
                    }
                    drawGrid(ctx, col, row);
                }
            }
        }

        function drawCurrentPiece() {
            if (!currentPiece) return;

            for (var row = 0; row < currentPiece.shape.length; row++) {
                for (var col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        drawBlock(ctx, currentPiece.x + col, currentPiece.y + row, currentPiece.color);
                    }
                }
            }
        }

        function drawNextPiece() {
            clearNextBoard();

            if (!nextPiece) return;

            var offsetX = Math.floor((4 - nextPiece.shape[0].length) / 2);
            var offsetY = Math.floor((4 - nextPiece.shape.length) / 2);

            for (var row = 0; row < nextPiece.shape.length; row++) {
                for (var col = 0; col < nextPiece.shape[row].length; col++) {
                    if (nextPiece.shape[row][col]) {
                        drawBlock(nextCtx, offsetX + col, offsetY + row, nextPiece.color);
                    }
                }
            }
        }

        function drawBlock(context, x, y, color) {
            var blockSize = BLOCK_SIZE;

            context.fillStyle = color;
            context.fillRect(x * blockSize + 1, y * blockSize + 1, blockSize - 2, blockSize - 2);

            context.fillStyle = 'rgba(255, 255, 255, 0.3)';
            context.fillRect(x * blockSize + 1, y * blockSize + 1, blockSize - 2, 3);
            context.fillRect(x * blockSize + 1, y * blockSize + 1, 3, blockSize - 2);

            context.fillStyle = 'rgba(0, 0, 0, 0.3)';
            context.fillRect(x * blockSize + blockSize - 4, y * blockSize + 1, 3, blockSize - 2);
            context.fillRect(x * blockSize + 1, y * blockSize + blockSize - 4, blockSize - 2, 3);
        }

        function drawGrid(context, x, y) {
            context.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            context.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }

        function clearNextBoard() {
            nextCtx.fillStyle = '#1a1a2e';
            nextCtx.fillRect(0, 0, next.width, next.height);
        }

        // ==================== 游戏循环 ====================

        function gameLoop(timestamp) {
            if (gameOver) return;

            if (!isPaused) {
                if (!lastDropTime) lastDropTime = timestamp;

                var deltaTime = timestamp - lastDropTime;

                if (deltaTime > dropInterval) {
                    moveDown();
                    last = lastDropTime = timestamp;
                }

                drawBoard();
                drawCurrentPiece();
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // ==================== 键盘控制 ====================

        function handleKeyPress(event) {
            if (gameOver) return;

            switch(event.key) {
                case 'ArrowLeft':
                    if (!isPaused) moveLeft();
                    event.preventDefault();
                    break;
                case 'ArrowRight':
                    if (!isPaused) moveRight();
                    event.preventDefault();
                    break;
                case 'ArrowDown':
                    if (!isPaused) moveDown();
                    event.preventDefault();
                    break;
                case 'ArrowUp':
                    if (!isPaused) rotate();
                    event.preventDefault();
                    break;
                case ' ':
                    if (!isPaused) hardDrop();
                    event.preventDefault();
                    break;
                case 'p':
                case 'P':
                    togglePause();
                    event.preventDefault();
                    break;
            }
        }

        // ==================== 移动端控制 ====================

        function initMobileControls() {
            var mobileControls = document.getElementById('mobileControls');
            if (!mobileControls) {
                log('mobileControls 未找到', 'warn');
                return;
            }

            var buttons = mobileControls.querySelectorAll('.control-btn');
            log('找到 ' + buttons.length + ' 个移动端控制按钮', 'info');

            buttons.forEach(function(btn) {
                var action = btn.getAttribute('data-action');
                if (!action) return;

                btn.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    handleMobileAction(action);
                    btn.classList.add('active');
                }, { passive: false });

                btn.addEventListener('mousedown', function(e) {
                    if (window.innerWidth <= 768) {
                        e.preventDefault();
                        handleMobileAction(action);
                    }
                });

                btn.addEventListener('touchend', function(e) {
                    e.preventDefault();
                    btn.classList.remove('active');
                }, { passive: false });

                btn.addEventListener('mouseup', function() {
                    btn.classList.remove('active');
                });
            });

            log('移动端控制已初始化', 'success');
        }

        function handleMobileAction(action) {
            if (gameOver) return;

            switch(action) {
                case 'up':
                    if (!isPaused) rotate();
                    break;
                case 'down':
                    if (!isPaused) moveDown();
                    break;
                case 'left':
                    if (!isPaused) moveLeft();
                    break;
                case 'right':
                    if (!isPaused) moveRight();
                    break;
                case 'rotate':
                    if (!isPaused) rotate();
                    break;
                case 'drop':
                    if (!isPaused) hardDrop();
                    break;
                case 'pause':
                    togglePause();
                    break;
            }
        }

        // ==================== 按钮处理 ====================

        function handleStartClick() {
            log('开始游戏按钮被点击', 'success');
            if (startGame) {
                try {
                    startGame();
                } catch (e) {
                    log('startGame() 调用失败: ' + e.message, 'error');
                }
            } else {
                log('startGame 函数不存在', 'error');
            }
        }

        function handlePauseClick() {
            log('暂停按钮被点击', 'info');
            if (togglePause) {
                try {
                    togglePause();
                } catch (e) {
                    log('togglePause() 调用失败: ' + e.message, 'error');
                }
            } else {
                log('togglePause() 函数不存在', 'error');
            }
        }

        // ==================== 调试 ====================

        function log(message, type) {
            var debug = document.getElementById('debug');
            if (!debug) return;

            var entry = document.createElement('div');
            entry.className = 'entry ' + (type || 'info');
            var timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            entry.textContent = '[' + timestamp + '] ' + message;
            debug.appendChild(entry);
            debug.scrollTop = debug.scrollHeight;
            console.log('[' + (type || 'info') + '] ' + message);
        }

        function showMessage(text) {
            var messageEl = document.getElementById('message');
            if (message) messageEl.textContent = text;
        }

        // ==================== 页面加载 ====================

        window.addEventListener('load', function() {
            log('window.onload 触发', 'info');

            try {
                init();
            } catch (e) {
                log('初始化失败: ' + e.message, 'error');
                log('堆栈: ' + e.stack, 'error');
            }
        });

        // 错误处理
        window.addEventListener('error', function(event) {
            log('JavaScript 错误: ' + event.message, 'error');
            if (event.filename) {
                log('  文件: ' + event.filename + ', 行: ' + event.lineno, 'error');
            }
        });
    </script>
</body>
</html>
