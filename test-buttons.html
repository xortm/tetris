<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 - 按钮点击测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; }
        .status {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            max-width: 600px;
            width: 100%;
        }
        .log {
            background: #0f172a;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        button {
            padding: 12px 24px;
            margin: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #2563eb; }
        button:active { transform: scale(0.95); }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        canvas {
            border: 2px solid #334155;
            border-radius: 8px;
            background: #1a1a2e;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🧪 按钮点击测试</h1>

    <div class="status">
        <h2>测试按钮（使用 onclick）</h2>
        <button id="testBtn1" onclick="testOnClick()">onclick 测试</button>
        <button id="testBtn2">addEventListener 测试</button>
    </div>

    <div class="status">
        <h2>日志</h2>
        <div class="log" id="log"></div>
    </div>

    <div class="status">
        <h2>游戏画布测试</h2>
        <canvas id="gameCanvas" width="300" height="600"></canvas>
        <canvas id="nextCanvas" width="100" height="100"></canvas>
        <br>
        <button onclick="testGameInit()">测试游戏初始化</button>
        <button onclick="testStartGame()">测试开始游戏</button>
    </div>

    <script>
        function log(message, type) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = type || '';
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        // 测试 onclick
        function testOnClick() {
            log('onclick 触发成功！', 'success');
            alert('onclick 工作正常！');
        }

        // 测试 addEventListener
        document.getElementById('testBtn2').addEventListener('click', function() {
            log('addEventListener 触发成功！', 'success');
            alert('addEventListener 工作正常！');
        });

        // 加载 tetris.js
        log('加载 tetris.js...', 'info');
        const script = document.createElement('script');
        script.src = 'tetris.js';
        script.onload = function() {
            log('tetris.js 加载成功', 'success');
            checkGameFunctions();
        };
        script.onerror = function() {
            log('tetris.js 加载失败', 'error');
        };
        document.head.appendChild(script);

        function checkGameFunctions() {
            if (typeof init === 'function') {
                log('✓ init 函数存在', 'success');
            } else {
                log('✗ init 函数不存在', 'error');
            }

            if (typeof startGame === 'function') {
                log('✓ startGame 函数存在', 'success');
            } else {
                log('✗ startGame 函数不存在', 'error');
            }

            if (typeof togglePause === 'function') {
                log('✓ togglePause 函数存在', 'success');
            } else {
                log('✗ togglePause 函数不存在', 'error');
            }
        }

        function testGameInit() {
            if (typeof init === 'function') {
                log('调用 init()...', 'info');
                try {
                    init();
                    log('✓ init() 调用成功', 'success');
                } catch (e) {
                    log('✗ init() 调用失败: ' + e.message, 'error');
                }
            } else {
                log('✗ init 函数不存在', 'error');
            }
        }

        function testStartGame() {
            if (typeof startGame === 'function') {
                log('调用 startGame()...', 'info');
                try {
                    startGame();
                    log('✓ startGame() 调用成功', 'success');
                } catch (e) {
                    log('✗ startGame() 调用失败: ' + e.message, 'error');
                }
            } else {
                log('✗ startGame 函数不存在', 'error');
            }
        }

        // 页面加载
        window.addEventListener('load', function() {
            log('页面加载完成', 'success');
        });

        // 错误处理
        window.addEventListener('error', function(event) {
            log('错误: ' + event.message, 'error');
        });
    </script>
</body>
</html>
