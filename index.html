<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - Tetris Game</title>
    <meta name="description" content="经典俄罗斯方块游戏，支持暂停、等级升级、计分系统">
    <meta name="keywords" content="俄罗斯方块，tetris，方块游戏，经典游戏">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-container">
            <div class="header">
                <h1 class="game-title">俄罗斯方块</h1>
                <p class="game-subtitle">经典游戏 · 极致体验</p>
            </div>
            
            <div class="game-wrapper">
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="300" height="600"></canvas>
                </div>
                
                <div class="side-panel">
                    <div class="info-box">
                        <h3 class="info-label">下一个</h3>
                        <div class="canvas-container">
                            <canvas id="nextCanvas" width="100" height="100"></canvas>
                        </div>
                    </div>
                    
                    <div class="info-box">
                        <h3 class="info-label">分数</h3>
                        <p id="score" class="info-value">0</p>
                    </div>
                    
                    <div class="info-box">
                        <h3 class="info-label">等级</h3>
                        <p id="level" class="info-value">1</p>
                    </div>
                    
                    <div class="info-box">
                        <h3 class="info-label">消除行数</h3>
                        <p id="lines" class="info-value">0</p>
                    </div>
                    
                    <div class="controls">
                        <button id="startBtn" class="btn-primary">
                            <span class="btn-text">开始游戏</span>
                        </button>
                        <button id="pauseBtn" class="btn-secondary">
                            <span class="btn-text">暂停</span>
                        </button>
                    </div>
                    
                    <div class="instructions">
                        <h3 class="instructions-title">操作说明</h3>
                        <div class="instruction-row">
                            <span class="key">← →</span>
                            <span class="desc">左右移动</span>
                        </div>
                        <div class="instruction-row">
                            <span class="key">↑</span>
                            <span class="desc">旋转</span>
                        </div>
                        <div class="instruction-row">
                            <span class="key">↓</span>
                            <span class="desc">加速下落</span>
                        </div>
                        <div class="instruction-row">
                            <span class="key">Space</span>
                            <span class="desc">直接下落</span>
                        </div>
                        <div class="instruction-row">
                            <span class="key">P</span>
                            <span class="desc">暂停/继续</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="tetris.js"></script>
</body>
</html>
